name: Security Hygiene

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tracked secret files
        run: |
          git ls-files | grep -E '(\.p8|\.p12|\.mobileprovision|\.jks|\.keystore|GoogleService-Info\.plist|google-services\.json|key\.properties|\.env($|\.)|service-account.*\.json)' && exit 1 || true

      - name: Scan for common key patterns
        run: |
          if rg -n 'BEGIN [A-Z ]+PRIVATE KEY|-----BEGIN (RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY-----|AIza[0-9A-Za-z_-]{20,}' . --glob '!*.lock' --glob '!LICENSE'; then
            echo "Potential secret material found"
            exit 1
          fi
